<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Calendar body -->
  <rect x="2" y="5" width="28" height="25" rx="3" fill="#1a3a5c" />
  <!-- Header bar -->
  <rect x="2" y="5" width="28" height="9" rx="3" fill="#1e4d7b" />
  <rect x="2" y="10" width="28" height="4" fill="#1e4d7b" />
  <!-- Binding pegs -->
  <rect x="9" y="2" width="3" height="7" rx="1.5" fill="#4a90c4" />
  <rect x="20" y="2" width="3" height="7" rx="1.5" fill="#4a90c4" />
  <!-- Grid dots representing days -->
  <rect x="7"  y="18" width="4" height="4" rx="1" fill="white" opacity="0.85" />
  <rect x="14" y="18" width="4" height="4" rx="1" fill="white" opacity="0.85" />
  <rect x="21" y="18" width="4" height="4" rx="1" fill="white" opacity="0.85" />
  <rect x="7"  y="25" width="4" height="3" rx="1" fill="white" opacity="0.6" />
  <rect x="14" y="25" width="4" height="3" rx="1" fill="white" opacity="0.6" />
  <rect x="21" y="25" width="4" height="3" rx="1" fill="white" opacity="0.6" />
</svg>
